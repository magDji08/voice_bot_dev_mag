services:
  mysql:
    image: mysql:8.0
    container_name: voicebot_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: voicebot_db
      MYSQL_USER: voicebot
      MYSQL_PASSWORD: voicebotpass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voicebot_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: voicebot
      DB_PASSWORD: voicebotpass
      DB_NAME: voicebot_db
      JWT_SECRET: voicebot_secret_senegal_2025_change_moi
      UPLOAD_DIR: /app/uploads
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads

volumes:
  mysql_data:
  backend_uploads:
